<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="author" content="Jim Cheung">
    <meta name="description" content="Curtis の Blog">
    <meta name="keywords" content="JimCheung, Jinhu, Blog">
    <title>Products | Curtis の Blog</title>
    <link rel="icon" href="/favicon.ico">
    
    <!-- scripts list from _config.yml -->
    <script src="/js/script.js"></script>
    <script src="/js/tocbot.min.js"></script>
    <script src="/js/products.js" defer></script>
    
    <!-- stylesheets list from _config.yml -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/products.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <nav class="navbar">
                <div class="container">
                    <div class="navbar-header header-logo"><a href="/">Curtis の Blog</a></div>
                    <div class="menu navbar-right">
                        <a class="menu-item" href="/archives">Posts</a>
                        <a class="menu-item" href="/products">Products</a>
                        <a class="menu-item" href="/interests">Interests</a>
                        <a class="menu-item" href="/collection">Collections</a>
                        <a class="menu-item" href="/about">About</a>
                        <input id="switch_default" type="checkbox" class="switch_default">
                        <label for="switch_default" class="toggleBtn"></label>
                    </div>
                </div>
            </nav>
            
            <nav class="navbar-mobile" id="nav-mobile">
                <div class="container">
                    <div class="navbar-header">
                        <div>
                            <a href="/">Curtis の Blog</a><a id="mobile-toggle-theme">·&nbsp;Light</a>
                        </div>
                        <div class="menu-toggle" onclick="mobileBtn()">&#9776; Menu</div>
                    </div>
                    <div class="menu" id="mobile-menu">
                        <a class="menu-item" href="/archives">Posts</a>
                        <a class="menu-item" href="/products">Products</a>
                        <a class="menu-item" href="/interests">Interests</a>
                        <a class="menu-item" href="/collection">Collections</a>
                        <a class="menu-item" href="/about">About</a>
                    </div>
                </div>
            </nav>
        </header>
        
        <div class="main">
            <div class="container">
                <article class="post-wrap page">
                    <h2 class="post-title">
                        <span>P</span>
                        <span>R</span>
                        <span>O</span>
                        <span>D</span>
                        <span>U</span>
                        <span>C</span>
                        <span>T</span>
                        <span>S</span>
                    </h2>
                    <div class="products-grid">
                        <div class="carousel-container">
                            
                            <div class="product-card" data-title="Mindful Retreat" data-description="My-Event-Website is a entry-level project for frontend development." data-image="/images/products/event.png" data-github="https://github.com/CurtisYoung18/7140-My-event-website" data-demo="/products/event/index.html">
                                <div class="card-content">
                                    <img src="/images/products/event.png" alt="my-event-website">
                                    <h1>Mindful Retreat</h1>
                                </div>
                            </div>
                            
                            <div class="product-card" data-title="GreenGo Portfolio" data-description="GreenGo Portfolio is a portfolio website for GreenGo, an online information platform for biking enthusiasts." data-image="/images/products/portfolio.gif" data-github="https://github.com/CurtisYoung18/My-Portfolio" data-demo="/products/GreenGo/Portfolio/portfolio.html">
                                <div class="card-content">
                                    <img src="/images/products/portfolio.gif" alt="GreenGo Portfolio">
                                    <h1>GreenGo Portfolio</h1>
                                </div>
                            </div>
                            
                           
                            
                            
                        </div>
                        <div class="carousel-scrollbar">
                            <div class="carousel-scrollbar-thumb"></div>
                        </div>
                    </div>
                </article>
            </div>
        </div>
        
        <footer id="footer" class="footer">
            <div class="copyright">
                <span>© Curtis Mei | Powered by <a href="https://hexo.io" target="_blank">Hexo</a> & <a href="https://github.com/Siricee/hexo-theme-Chic" target="_blank">Chic</a></span>
            </div>
        </footer>
    </div>

    <!-- 添加弹出层 -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img class="modal-image" src="" alt="">
            <h2 class="modal-title"></h2>
            <p class="modal-description"></p>
            <div class="modal-links">
                <a href="" target="_blank" class="github-link"><i class="iconfont icon-github" style="font-size: 1.5em;"></i>View on GitHub</a>
                <a href="" target="_blank" class="demo-link"><i class="iconfont icon-try" style="font-size: 1.5em;"></i>Try Demo</a>

            </div>
        </div>
    </div>

    <script type="text/javascript" src="/js/canvas-nest.js" color="0,0,0" opacity="0.3" zindex="-2" count="99"></script>
</body>
</html>
